name: CI Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  lint-and-test:
    name: Code Analysis and Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./app
        run: npm install

      - name: Run ESLint
        working-directory: ./app
        run: npm run lint

      - name: Run Tests with Coverage
        working-directory: ./app
        run: npm run test

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./app/coverage/

  build-and-push:
    name: Build and Push Docker Image
    needs: lint-and-test 
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=long
            type=ref,event=tag
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-and-verify:
    name: Deploy and Verify
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/') # Запускається ТІЛЬКИ на анотовані теги
    runs-on: self-hosted 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Target Node
        run: |
          # Вказуємо IP твоєї цільової машини
          TARGET="slava-target-node@192.168.0.142"
          
          echo "Копіювання systemd-unit..."
          scp scripts/mywebapp.service $TARGET:/tmp/mywebapp.service
          
          echo "Налаштування сервісу на Target Node..."
          ssh $TARGET "sudo mv /tmp/mywebapp.service /etc/systemd/system/mywebapp.service"
          ssh $TARGET "sudo systemctl daemon-reload"
          
          # Вимикаємо старий сокет з Лаби 1, якщо він досі активний
          ssh $TARGET "sudo systemctl stop mywebapp.socket || true"
          ssh $TARGET "sudo systemctl disable mywebapp.socket || true"
          
          echo "Перезапуск контейнера..."
          ssh $TARGET "sudo systemctl enable mywebapp.service"
          ssh $TARGET "sudo systemctl restart mywebapp.service"

      - name: Verify Deployment
        run: |
          TARGET_IP="192.168.0.142"
          TARGET="slava-target-node@$TARGET_IP"
          
          echo "Очікування запуску контейнера (5 секунд)..."
          sleep 5
          
          echo "1. Перевірка Nginx..."
          ssh $TARGET "sudo nginx -t"
          
          echo "2. Перевірка доступності сервісу (HTTP 200)..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$TARGET_IP/health/alive || echo "failed")
          
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Верифікація неуспішна! Отримано статус: $HTTP_STATUS"
            exit 1
          fi
          echo "Верифікація успішна! Сервіс працює і відповідає."